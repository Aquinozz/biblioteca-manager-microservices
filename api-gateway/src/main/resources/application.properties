spring.application.name=api-gateway

server.port=8080

eureka.client.service-url.defaultZone=http://discovery-server:8761/eureka

spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.server.webflux.routes[0].id=auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/auth/**
spring.cloud.gateway.server.webflux.routes[0].filters[0]=StripPrefix=1

spring.cloud.gateway.server.webflux.routes[1].id=book-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://BOOK-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/livros/**
spring.cloud.gateway.server.webflux.routes[1].filters[0]=StripPrefix=1

spring.cloud.gateway.server.webflux.routes[2].id=vendas-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://VENDAS-SERVICE
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/vendas/**
spring.cloud.gateway.server.webflux.routes[2].filters[0]=StripPrefix=1